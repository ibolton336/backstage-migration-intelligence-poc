app:
  title: Migration Intelligence POC
  baseUrl: http://localhost:3000

organization:
  name: Konveyor

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  cors:
    origin: http://localhost:3000
    methods: [GET, POST, PUT, DELETE]
    credentials: true

catalog:
  rules:
    - allow: [Component, Resource, API, System, Domain, Group, User, Location]
  locations:
    # Migration intelligence example entities
    - type: file
      target: ./examples/entities.yaml

    # Uncomment to add your own application catalog
    # - type: url
    #   target: https://github.com/your-org/your-app/blob/main/catalog-info.yaml

# Migration Intelligence plugin configuration
migrationIntelligence:
  # Konveyor Hub API endpoint (when backend plugin is implemented)
  hubUrl: http://localhost:9443
  # Default migration target
  defaultTarget: quarkus-3
  # Poll interval for migration status (ms)
  pollInterval: 5000
