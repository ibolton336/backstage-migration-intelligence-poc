app:
  title: Migration Intelligence POC
  baseUrl: http://localhost:7007
backend:
  auth:
    keys:
      - secret: development
  baseUrl: http://localhost:7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
    upgrade-insecure-requests: false
  cors:
    origin: ${BASE_URL}
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: better-sqlite3
    connection: ':memory:'

integrations: {}
proxy:
  endpoints: {}
auth:
  environment: development
  providers:
    guest:
      dangerouslyAllowOutsideDevelopment: true

catalog:
  rules:
    - allow: [Component, Resource, API, System, Domain, Group, User, Location]
  locations:
    - type: file
      target: ./examples/entities.yaml

dynamicPlugins:
  rootDirectory: dynamic-plugins-root
